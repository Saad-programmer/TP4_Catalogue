        🏠 Accueil
    </a>
    <a routerLink="/produits" routerLinkActive="actif">
        🏠 Produits
    </a>
    <a routerLink="/contact" routerLinkActive="actif">
        🏠 Contact
    </a>
    <a routerLink="/admin" routerLinkActive="actif">
        🏠 Admin
    </a>
    <a routerLink="/login" routerLinkActive="actif">
        🏠 Connexion
    </a>
</nav>
